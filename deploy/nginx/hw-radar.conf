# CT-internal nginx, deployed on the hw-radar CT. Model A (see
# docs/runbooks/provisioning.md): the front reverse proxy on the container host
# terminates public TLS for hw-radar.l3digital.net and proxies here over the
# private network. This server serves /static/ and proxies the app to gunicorn.
#
# No TLS/ACME here on purpose: the CT has no public IP, so a Let's Encrypt
# HTTP-01 challenge cannot reach it — TLS terminates one hop up at the host
# proxy, which sets X-Forwarded-Proto=https. `listen 80` (no address) binds the
# CT's private interface only; the internal proxy target is host-side config and
# intentionally not encoded in this public repo.
server {
    listen 80;
    server_name hw-radar.l3digital.net;

    location /static/ {
        alias /opt/hw-radar/app/staticfiles/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        # Preserve the ORIGINAL scheme from the TLS-terminating host proxy; do
        # NOT use $scheme (it is http on this internal hop). Django's
        # SECURE_PROXY_SSL_HEADER trusts X-Forwarded-Proto to detect HTTPS, so
        # overwriting it here would break secure-cookie / CSRF-origin checks.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
