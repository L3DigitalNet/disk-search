name: Check

on:
  pull_request:
  push:
    branches: ["main", "dev"]
  workflow_call:
    inputs:
      ref:
        description: "Ref to check (deploy.yml passes the exact ref it will ship)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      db:
        image: timescale/timescaledb:2.28.2-pg17
        env:
          POSTGRES_DB: hw_radar
          POSTGRES_USER: hw_radar
          POSTGRES_PASSWORD: hw_radar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hw_radar"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      # SHA-pinned: setup-uv has no moving @v8 tag (dropped as of v8.0.0);
      # Dependabot bumps the SHA via the trailing version comment.
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.6"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --all-groups

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run basedpyright

      - name: Test with coverage
        run: uv run coverage run -m pytest

      - name: Coverage report
        run: uv run coverage report

      - name: Dependency audit
        run: uv run pip-audit
