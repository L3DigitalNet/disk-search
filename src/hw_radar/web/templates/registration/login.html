{% extends "base.html" %}
{% block title %}Log in - Hardware Radar{% endblock %}
{% block content %}
  <h1>Log in</h1>
  {% if form.errors %}<p>Invalid credentials.</p>{% endif %}
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log in</button>
  </form>
{% endblock %}
